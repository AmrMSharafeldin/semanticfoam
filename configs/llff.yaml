# ============================
# Model Parameters
# ============================
sh_degree: 3
init_points: 131_072
final_points: 500_000
activation_scale: 1
identity_dim: 16
device: cuda
unfreeze_seg_iter: 0

# ============================
# Pipeline Parameters
# ============================
iterations: 20_000
chpt_iter: full
save_every: 5_000
densify_from: 2_000
densify_until: 11_000
densify_factor: 1.15
white_background: true
quantile_weight: 1e-4
viewer: false
debug: false
experiment_name: "og_radfoam/room"
training_mode: "color"
use_TV: True
tv_lambda: 0
segmentattion_loss_type: "ce"
segmentation_loss_weight: 1.
freeeze_segmentation_at: 30_000

# ============================
# Point removal / manipulation
# ============================
application_mode: "remove"
target_class: [22]
import_asset_path: "output/garden_ce/objects/cherry_blossom_tree_class[1, 9, 21].pt"

# ============================
# Optimization Parameters
# ============================
points_lr_init: 2e-4
points_lr_final: 5e-6
density_lr_init: 1e-1
density_lr_final: 1e-2
attributes_lr_init: 5e-3
attributes_lr_final: 5e-4
sh_factor: 0.02
freeze_points: 18_000

# ============================s
# Dataset Parameters
# ============================
dataset: "colmap"
data_path: "data/nerf_llff_data"
scene: "room"
patch_based: false
downsample: [1, 1]
downsample_iterations: [0, 3_0000]
radiance_batch_size: 900_000
segmentation_batch_size: 90_0000

# ============================
# Classifier Parameters
# ============================
input_dim: 16
num_classes: 256
classifier_lr: 5e-3


import_translation: [0.0, 0.0, 0.0]
import_scale: 1.0
import_rotation: [0, 0, 0]
import_debug: false

